name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Configure local beta env
        run: |
          printf 'DATABASE_URL=file:./dev.db\n' > .env
          printf 'OPENROUTER_API_KEY=\n' > .env.local

      - run: npm run check:env
      - run: npm run preflight:models
      - run: npm run smoke:openrouter
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm test -- --runInBand
      - run: npm run test:e2e
      - run: npm run build
